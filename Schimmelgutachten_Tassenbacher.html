// ─── PHYSIK ───────────────────────────────────────────────────────────────────
function taupunkt(T, rF) {
  if (!T || !rF || isNaN(T) || isNaN(rF)) return null;
  const a = 17.27, b = 237.7;
  const alpha = (a * T) / (b + T) + Math.log(rF / 100);
  return (b * alpha) / (a - alpha);
}
function kritOberflTemp(T, rF_ziel = 80) { return taupunkt(T, rF_ziel); }

// ─── FEUCHTE BADGE (mit fRsi) ────────────────────────────────────────────────
function FeuchteBadge({ T, rF, oberflaechentemp }) {
  const Tf = parseFloat(T), rFf = parseFloat(rF), Tof = parseFloat(oberflaechentemp);
  const tp = taupunkt(Tf, rFf);
  const t80 = kritOberflTemp(Tf, 80);
  if (tp === null && t80 === null) return null;
  const kondRisk = tp !== null && !isNaN(Tof) ? Tof <= tp : tp !== null && Tf - tp < 3;
  const schimmelRisk = t80 !== null && !isNaN(Tof) ? Tof <= t80 : null;

  // fRsi = (Tsi - Te) / (Ti - Te) — vereinfacht mit Te = Taupunkt als Näherung
  // Korrekte Formel braucht Außentemp — hier zeigen wir fRsi,crit = (t80 - Te_annahme) / (Ti - Te_annahme)
  // Wir berechnen fRsi,gemessen wenn Tofl bekannt
  const fRsi = !isNaN(Tof) && !isNaN(Tf) && tp !== null ? ((Tof - (Tf - 20)) / (Tf - (Tf - 20))).toFixed(2) : null;
  // Kritischer fRsi nach EN ISO 13788 (Richtwert 0.71 für Wohnräume)
  const fRsiKrit = t80 !== null && !isNaN(Tf) ? ((t80 - (Tf - 20)) / (Tf - (Tf - 20))).toFixed(2) : null;

  return (
    <div style={{ marginBottom: 10, display: "flex", flexDirection: "column", gap: 6 }}>
      {tp !== null && (
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", background: kondRisk ? "#FFF0EE" : "#EFF8F1", border: `1px solid ${kondRisk ? "#E74C3C" : "#27AE60"}`, borderRadius: 9, padding: "7px 12px" }}>
          <span style={{ fontSize: 11, color: C.darkGray, fontWeight: 600 }}>💧 Taupunkt</span>
          <span style={{ fontFamily: "monospace", fontWeight: 800, fontSize: 14, color: kondRisk ? C.danger : C.success }}>{tp.toFixed(1)} °C</span>
          {kondRisk ? <span style={{ fontSize: 11, color: C.danger, fontWeight: 700 }}>⚠ Kondensation möglich</span> : <span style={{ fontSize: 11, color: C.success }}>✓ kein Risiko</span>}
        </div>
      )}
      {t80 !== null && (
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", background: schimmelRisk === true ? "#FFF4EC" : schimmelRisk === false ? "#EFF8F1" : "#F8F8F8", border: `1px solid ${schimmelRisk === true ? C.warn : schimmelRisk === false ? "#27AE60" : C.lightGray}`, borderRadius: 9, padding: "7px 12px" }}>
          <span style={{ fontSize: 11, color: C.darkGray, fontWeight: 600 }}>🍄 Schimmelgrenze</span>
          <span style={{ fontFamily: "monospace", fontWeight: 800, fontSize: 14, color: schimmelRisk === true ? C.warn : schimmelRisk === false ? C.success : C.darkGray }}>{t80.toFixed(1)} °C</span>
          <span style={{ fontSize: 10, color: C.darkGray }}>Oberfl. bei 80% rF (EN ISO 13788)</span>
          {schimmelRisk === true && <span style={{ fontSize: 11, color: C.warn, fontWeight: 700 }}>⚠ Schimmelrisiko</span>}
          {schimmelRisk === false && <span style={{ fontSize: 11, color: C.success }}>✓ unter Grenze</span>}
        </div>
      )}
      {/* fRsi Badge */}
      {!isNaN(Tof) && !isNaN(Tf) && t80 !== null && (
        <div style={{ background: "#F5F7FF", border: `1px solid ${C.blue}30`, borderRadius: 9, padding: "7px 12px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 11, color: C.darkGray, fontWeight: 600 }}>📐 fRsi (Temperaturfaktor)</span>
            <span style={{ fontFamily: "monospace", fontWeight: 800, fontSize: 13, color: C.blue }}>
              gemessen: {((Tof - (Tf - 20)) / 20).toFixed(2)}
            </span>
            <span style={{ fontFamily: "monospace", fontSize: 12, color: C.darkGray }}>
              krit: {((t80 - (Tf - 20)) / 20).toFixed(2)}
            </span>
          </div>
          <div style={{ fontSize: 10, color: C.darkGray, marginTop: 3 }}>
            fRsi = (Tsi − Te) / (Ti − Te) · Richtwert ≥ 0.71 (EN ISO 13788, Te = Ti−20°C angenommen)
          </div>
          {((Tof - (Tf - 20)) / 20) < ((t80 - (Tf - 20)) / 20) && (
            <div style={{ fontSize: 11, color: C.warn, fontWeight: 700, marginTop: 3 }}>⚠ fRsi unter kritischem Wert</div>
          )}
        </div>
      )}
    </div>
  );
}

function FotoUpload({ fotos, onChange }) {
  const inputRef = useRef();
  const [saved, setSaved] = useState({});
  const handleFiles = (e) => {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => onChange(prev => [...prev, { id: Date.now() + Math.random(), data: ev.target.result, name: file.name, beschreibung: "" }]);
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };
  const saveToGallery = (foto) => {
    const a = document.createElement("a");
    a.href = foto.data;
    a.download = foto.name || `schimmel_${Date.now()}.jpg`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setSaved(s => ({ ...s, [foto.id]: true }));
    setTimeout(() => setSaved(s => ({ ...s, [foto.id]: false })), 2000);
  };
  return (
    <div>
      <input ref={inputRef} type="file" accept="image/*" multiple capture="environment" onChange={handleFiles} style={{ display: "none" }} />
      {fotos.map(foto => (
        <div key={foto.id} style={{ borderRadius: 10, overflow: "hidden", border: `1px solid ${C.lightGray}`, marginBottom: 8 }}>
          <div style={{ position: "relative" }}>
            <img src={foto.data} alt="" style={{ width: "100%", aspectRatio: "4/3", objectFit: "cover", display: "block" }} />
            <button onClick={() => onChange(prev => prev.filter(f => f.id !== foto.id))} style={{ position: "absolute", top: 7, right: 7, width: 26, height: 26, borderRadius: "50%", background: "rgba(0,0,0,0.65)", border: "none", color: C.white, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
          </div>

// ─── SIGNATUR PAD ─────────────────────────────────────────────────────────────
function SignaturPad({ signatur, onChange }) {
  const canvasRef = useRef();
  const [drawing, setDrawing] = useState(false);
  const lastPos = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#FAFAFA"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = "11px sans-serif"; ctx.fillStyle = C.lightGray;
    ctx.fillText("Unterschrift hier", 20, canvas.height / 2);
    if (signatur) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0);
      img.src = signatur;
    }
  }, []);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  };
  const start = (e) => { e.preventDefault(); setDrawing(true); lastPos.current = getPos(e, canvasRef.current); };
  const draw = (e) => {
    e.preventDefault(); if (!drawing) return;
    const canvas = canvasRef.current, ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = "#111"; ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.stroke();
    lastPos.current = pos;
  };
  const end = () => { if (!drawing) return; setDrawing(false); onChange(canvasRef.current.toDataURL()); };
  const clear = () => {
    const canvas = canvasRef.current, ctx = canvas.getContext("2d");
    ctx.fillStyle = "#FAFAFA"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = "11px sans-serif"; ctx.fillStyle = C.lightGray;
    ctx.fillText("Unterschrift hier", 20, canvas.height / 2);
    onChange(null);
  };

  return (
    <div>
      <canvas ref={canvasRef} width={500} height={140}
        onMouseDown={start} onMouseMove={draw} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={draw} onTouchEnd={end}
        style={{ width: "100%", aspectRatio: "500/140", border: `1.5px solid ${C.lightGray}`, borderRadius: 10, touchAction: "none", display: "block", background: "#FAFAFA", cursor: "crosshair" }}
      />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6 }}>
        <span style={{ fontSize: 11, color: C.darkGray }}>Unterschrift des Auftraggebers</span>
        <button onClick={clear} style={{ background: "none", border: "none", color: C.danger, fontSize: 12, cursor: "pointer", fontWeight: 600 }}>🗑 Löschen</button>
      </div>
    </div>
  );
}

// ─── BACKUP PANEL ─────────────────────────────────────────────────────────────
function BackupPanel({ allData, onRestore }) {
  const [msg, setMsg] = useState("");

  const exportJSON = () => {
    const json = JSON.stringify(allData, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `schimmel_backup_${new Date().toISOString().split("T")[0]}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setMsg("✓ Backup heruntergeladen");
    setTimeout(() => setMsg(""), 3000);
  };

  const importJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.begehungen) {
          onRestore(data);
          setMsg(`✓ ${data.begehungen.length} Begehungen importiert`);
        } else setMsg("❌ Ungültiges Backup-Format");
      } catch { setMsg("❌ Datei konnte nicht gelesen werden"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const inputRef = useRef();

  return (
    <Card>
      <ST>💾 Datensicherung / Backup</ST>
      <div style={{ fontSize: 12, color: C.darkGray, marginBottom: 12, background: "#FFF8EE", padding: "10px 12px", borderRadius: 8, border: `1px solid ${C.orange}30` }}>
        ⚠️ Alle Daten liegen nur lokal im Browser. Beim Löschen des Browser-Caches gehen sie verloren. Regelmäßig sichern!
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        <button onClick={exportJSON} style={{ flex: 1, padding: "12px", borderRadius: 10, border: "none", background: C.blue, color: C.white, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
          ⬇️ Backup exportieren (.json)
        </button>
        <button onClick={() => inputRef.current.click()} style={{ flex: 1, padding: "12px", borderRadius: 10, border: `2px solid ${C.blue}`, background: "transparent", color: C.blue, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
          ⬆️ Backup importieren
        </button>
      </div>
      <input ref={inputRef} type="file" accept=".json" onChange={importJSON} style={{ display: "none" }} />
      {msg && <div style={{ fontSize: 12, fontWeight: 700, color: msg.startsWith("✓") ? C.success : C.danger, textAlign: "center", padding: "6px" }}>{msg}</div>}
      <div style={{ fontSize: 11, color: C.darkGray, marginTop: 4 }}>
        {allData.begehungen.length} Begehungen · {Math.round(JSON.stringify(allData).length / 1024)} KB gespeichert
      </div>
    </Card>
  );
}

// ─── GRUNDRISS SKIZZE ────────────────────────────────────────────────────────
function GrundrissSkizze({ skizze, planBild, onSkizzeChange, onPlanChange }) {
  const canvasRef = useRef();
  const planInputRef = useRef();
  const [drawing, setDrawing] = useState(false);
  const [tool, setTool] = useState("pen");
  const [penColor, setPenColor] = useState(C.danger);
  const [penSize, setPenSize] = useState(3);
  const lastPos = useRef(null);
  const COLORS = [C.danger, "#E67E22", C.blue, "#27AE60", "#222"];

  const initCanvas = () => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#FAFAFA"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const drawSkizze = () => { if (skizze) { const s = new Image(); s.onload = () => ctx.drawImage(s, 0, 0, canvas.width, canvas.height); s.src = skizze; } };
    if (planBild) {
      const img = new Image();
      img.onload = () => {
        const sc = Math.min(canvas.width / img.width, canvas.height / img.height);
        const w = img.width * sc, h = img.height * sc;
        ctx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
        drawSkizze();
      };
      img.src = planBild;
    } else drawSkizze();
  };

  useEffect(() => { initCanvas(); }, [planBild]);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  };
  const startDraw = (e) => { e.preventDefault(); setDrawing(true); lastPos.current = getPos(e, canvasRef.current); };
  const draw = (e) => {
    e.preventDefault(); if (!drawing) return;
    const canvas = canvasRef.current, ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y);
    if (tool === "eraser") { ctx.strokeStyle = "#FAFAFA"; ctx.lineWidth = 22; }
    else { ctx.strokeStyle = penColor; ctx.lineWidth = penSize; }
    ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.stroke();
    lastPos.current = pos;
  };
  const endDraw = () => { if (!drawing) return; setDrawing(false); onSkizzeChange(canvasRef.current.toDataURL()); };
  const clearDrawing = () => { onSkizzeChange(null); setTimeout(() => initCanvas(), 50); };
  const handlePlanUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { onPlanChange(ev.target.result); onSkizzeChange(null); };
    reader.readAsDataURL(file); e.target.value = "";
  };

  return (
    <div>
      <input ref={planInputRef} type="file" accept="image/*" onChange={handlePlanUpload} style={{ display: "none" }} />
      {!planBild ? (
        <button onClick={() => planInputRef.current.click()} style={{ width: "100%", padding: 11, borderRadius: 10, marginBottom: 10, border: `2px dashed ${C.blue}`, background: C.blue + "08", color: C.blue, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
          🗺 Grundrissplan hochladen (optional)
        </button>
      ) : (
        <div style={{ display: "flex", gap: 8, marginBottom: 10, padding: "8px 12px", background: C.blue + "10", borderRadius: 10, border: `1px solid ${C.blue}30`, alignItems: "center" }}>
          <span style={{ fontSize: 13, color: C.blue, fontWeight: 600, flex: 1 }}>🗺 Plan geladen</span>
          <button onClick={() => planInputRef.current.click()} style={{ background: "none", border: "none", color: C.blue, fontSize: 12, cursor: "pointer", fontWeight: 600 }}>Ersetzen</button>
          <button onClick={() => { onPlanChange(null); onSkizzeChange(null); setTimeout(() => initCanvas(), 50); }} style={{ background: "none", border: "none", color: C.danger, fontSize: 12, cursor: "pointer", fontWeight: 600 }}>Entfernen</button>
        </div>
      )}
      <div style={{ display: "flex", gap: 5, marginBottom: 8, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ display: "flex", gap: 4 }}>
          {[{ id: "pen", icon: "✏️" }, { id: "eraser", icon: "⬜" }].map(t => (
            <button key={t.id} onClick={() => setTool(t.id)} style={{ padding: "7px 11px", borderRadius: 8, fontSize: 13, fontWeight: 700, border: `2px solid ${tool === t.id ? C.blue : C.lightGray}`, background: tool === t.id ? C.blue + "15" : "transparent", color: tool === t.id ? C.blue : C.darkGray, cursor: "pointer" }}>{t.icon}</button>
          ))}
          <button onClick={clearDrawing} style={{ padding: "7px 10px", borderRadius: 8, border: `2px solid ${C.lightGray}`, background: "transparent", color: C.danger, cursor: "pointer", fontSize: 13 }}>🗑</button>
        </div>
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          {[2, 4, 7].map(s => (
            <button key={s} onClick={() => setPenSize(s)} style={{ width: 28, height: 28, borderRadius: "50%", border: `2px solid ${penSize === s ? C.blue : C.lightGray}`, background: penSize === s ? C.blue + "15" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <div style={{ width: s * 1.5, height: s * 1.5, borderRadius: "50%", background: penColor }} />
            </button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 5 }}>
          {COLORS.map(c => <button key={c} onClick={() => { setPenColor(c); setTool("pen"); }} style={{ width: 24, height: 24, borderRadius: "50%", background: c, border: `3px solid ${penColor === c ? "#222" : "transparent"}`, cursor: "pointer", padding: 0 }} />)}
        </div>
      </div>
      <canvas ref={canvasRef} width={700} height={500}
        onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
        onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
        style={{ width: "100%", aspectRatio: "7/5", borderRadius: 10, touchAction: "none", border: `1.5px solid ${C.lightGray}`, cursor: tool === "pen" ? "crosshair" : "cell", display: "block", background: "#FAFAFA" }}
      />
      <div style={{ fontSize: 11, color: C.darkGray, marginTop: 5, textAlign: "center" }}>
        {planBild ? "Plan als Hintergrund – Schimmelstellen markieren" : "Freihand skizzieren oder Plan hochladen"}
      </div>
    </div>
  );
}

// ─── QR CODE ─────────────────────────────────────────────────────────────────
function QRCode({ text, size = 200 }) {
  const canvasRef = useRef();
  useEffect(() => {
    if (!canvasRef.current || !text) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = C.white;
    ctx.fillRect(0, 0, size, size);
    // Einfacher QR-Platzhalter mit Zusammenfassung als Text
    ctx.fillStyle = C.blue;
    ctx.font = "bold 11px monospace";
    ctx.fillText("QR-Code", 10, 20);
    ctx.font = "9px monospace";
    const words = text.split("\n");
    words.slice(0, 18).forEach((line, i) => {
      ctx.fillText(line.substring(0, 28), 10, 38 + i * 9);
    });
    // Rahmen
    ctx.strokeStyle = C.blue; ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, size - 2, size - 2);
  }, [text, size]);
  return <canvas ref={canvasRef} width={size} height={size} style={{ borderRadius: 10, display: "block" }} />;
}

  const done = CHECKLISTE_ITEMS.filter(i => checks[i.id]).length;
  const pct = Math.round((done / total) * 100);

  return (
    <div>
      <div style={{ background: `linear-gradient(140deg, ${C.blue} 0%, #0D2F5E 100%)`, padding: "20px 16px 16px", borderRadius: "0 0 20px 20px", marginBottom: 14 }}>

        <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, marginBottom: 10 }}>{done} / {total} abgehakt</div>
        <div style={{ background: "rgba(255,255,255,0.2)", borderRadius: 20, height: 6, overflow: "hidden" }}>
          <div style={{ width: `${pct}%`, height: "100%", background: pct === 100 ? C.success : C.orange, borderRadius: 20, transition: "width 0.3s" }} />
        </div>
      </div>
      <div style={{ padding: "0 16px 100px" }}>
        {gruppen.map(gruppe => (
          <Card key={gruppe}>
            <ST>{gruppe}</ST>
            {CHECKLISTE_ITEMS.filter(i => i.gruppe === gruppe).map(item => (
              <div key={item.id} onClick={() => onChange(item.id, !checks[item.id])} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: `1px solid ${C.bg}`, cursor: "pointer" }}>
                <div style={{
                  width: 24, height: 24, borderRadius: 6, flexShrink: 0,
                  border: `2px solid ${checks[item.id] ? C.success : C.lightGray}`,
                  background: checks[item.id] ? C.success : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "all 0.15s",
                }}>
                  {checks[item.id] && <span style={{ color: C.white, fontSize: 14, fontWeight: 900 }}>✓</span>}
                </div>
                <span style={{ fontSize: 14, color: checks[item.id] ? C.darkGray : "#222", textDecoration: checks[item.id] ? "line-through" : "none", lineHeight: 1.3 }}>{item.text}</span>
              </div>
            ))}
          </Card>
        ))}
        {pct === 100 && (
          <div style={{ textAlign: "center", padding: "16px", background: C.success + "15", borderRadius: 12, border: `1px solid ${C.success}40` }}>
            <div style={{ fontSize: 28 }}>✅</div>
            <div style={{ fontWeight: 800, color: C.success, marginTop: 4 }}>Checkliste vollständig!</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SPRACHNOTIZEN ───────────────────────────────────────────────────────────
function SprachNotizen({ notizen, onChange }) {
  const [recording, setRecording] = useState(false);
  const [seconds, setSeconds] = useState(0);
  const mediaRef = useRef(null);
  const chunksRef = useRef([]);
  const timerRef = useRef(null);

  const startRec = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      mediaRef.current = mr;
      chunksRef.current = [];
      mr.ondataavailable = e => chunksRef.current.push(e.data);
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: "audio/webm" });
        const url = URL.createObjectURL(blob);
        const newNotiz = {
          id: Date.now(),
          url, // nur Session — geht beim Reload verloren
          dauer: seconds,
          transkript: "",
          datum: new Date().toLocaleTimeString("de-AT", { hour: "2-digit", minute: "2-digit" }),
        };
        onChange(prev => [...(prev || []), newNotiz]);
        stream.getTracks().forEach(t => t.stop());
        setSeconds(0);
      };
      mr.start();
      setRecording(true);
      timerRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
    } catch {
      alert("Mikrofon-Zugriff nicht möglich. Bitte Berechtigung erteilen.");
    }
  };

  const stopRec = () => {
    mediaRef.current?.stop();
    clearInterval(timerRef.current);
    setRecording(false);
  };

  const deleteNotiz = (id) => onChange(prev => prev.filter(n => n.id !== id));
  const updateTranskript = (id, text) => onChange(prev => prev.map(n => n.id === id ? { ...n, transkript: text } : n));
  const fmt = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

  return (
    <div>
      {/* Hinweis */}
      <div style={{ fontSize: 11, color: C.warn, background: "#FFF8EE", border: `1px solid ${C.warn}30`, borderRadius: 8, padding: "8px 10px", marginBottom: 10 }}>
        ⚠️ Audio bleibt nur während dieser Sitzung. Transkript wird dauerhaft gespeichert — bitte nach der Aufnahme ausfüllen.
      </div>

      {(notizen || []).map(n => (
        <div key={n.id} style={{ background: C.bg, borderRadius: 10, padding: "10px 12px", marginBottom: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: C.darkGray }}>{n.datum}</span>
            <span style={{ fontSize: 10, color: C.darkGray }}>· {fmt(n.dauer)}</span>
            {n.url
              ? <audio src={n.url} controls style={{ flex: 1, height: 28, minWidth: 0 }} />
              : <span style={{ flex: 1, fontSize: 11, color: C.lightGray, fontStyle: "italic" }}>Audio nicht mehr verfügbar (Seite neu geladen)</span>
            }
            <button onClick={() => deleteNotiz(n.id)} style={{ background: "none", border: "none", color: C.danger, fontSize: 16, cursor: "pointer", padding: 0 }}>🗑</button>
          </div>
          <input
            value={n.transkript} onChange={e => updateTranskript(n.id, e.target.value)}
            placeholder="Transkript / Notiz zur Aufnahme (wird gespeichert)..."
            style={{ width: "100%", border: `1px solid ${C.lightGray}`, borderRadius: 7, padding: "7px 9px", fontSize: 12, fontFamily: "inherit", outline: "none", boxSizing: "border-box", background: n.transkript ? C.white : "#FFFBF5" }}
          />
        </div>
      ))}

      <button
        onClick={recording ? stopRec : startRec}
        style={{
          width: "100%", padding: "13px", borderRadius: 11, border: "none",
          background: recording ? C.danger : C.blue,
          color: C.white, fontSize: 14, fontWeight: 800, cursor: "pointer",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
        }}
      >
        {recording
          ? <><span style={{ width: 10, height: 10, borderRadius: "50%", background: C.white, display: "inline-block" }} />Aufnahme stoppen — {fmt(seconds)}</>
          : <>🎙 Sprachnotiz aufnehmen</>
        }
      </button>
    </div>
  );
}

];

const BAUTEIL_TYPEN = [
  "Außenwand", "Innenwand (gegen unbeh. Raum)", "Bodenplatte / Erdreich",
  "Kellerdecke", "Oberste Geschoßdecke", "Dachschräge", "Flachdach", "Fenster / Tür",
];

// Rsi/Rse Wärmeübergangswiderstände nach EN ISO 6946
const RSI_RSE = {
  "Außenwand":                    { rsi: 0.13, rse: 0.04 },
  "Innenwand (gegen unbeh. Raum)":{ rsi: 0.13, rse: 0.13 },
  "Bodenplatte / Erdreich":       { rsi: 0.17, rse: 0.04 },
  "Kellerdecke":                  { rsi: 0.17, rse: 0.17 },
  "Oberste Geschoßdecke":         { rsi: 0.10, rse: 0.10 },
  "Dachschräge":                  { rsi: 0.13, rse: 0.04 },
  "Flachdach":                    { rsi: 0.10, rse: 0.04 },
  "Fenster / Tür":                { rsi: 0.13, rse: 0.04 },
};

function berechneUWert(schichten, bauteilTyp) {
  if (!schichten || schichten.length === 0) return null;
  const { rsi, rse } = RSI_RSE[bauteilTyp] || { rsi: 0.13, rse: 0.04 };
  let rGesamt = rsi + rse;
  for (const s of schichten) {
    const d = parseFloat(s.dicke);
    const l = parseFloat(s.lambda);
    if (isNaN(d) || isNaN(l) || l === 0) return null;
    rGesamt += (d / 100) / l; // dicke in cm → m
  }
  return 1 / rGesamt;
}

    "Kellerdecke": 0.40, "Oberste Geschoßdecke": 0.20,
    "Dachschräge": 0.20, "Flachdach": 0.20,

    </div>
  );
}

function BauteilEditor({ bauteil, onChange }) {
  const b = bauteil || { typ: "", baujahr: "", sanierungsjahr: "", schichten: [], uWertManuell: "", notizen: "" };
  const update = (field, val) => onChange({ ...b, [field]: val });

  const addSchicht = () => update("schichten", [...(b.schichten || []), { id: Date.now(), bezeichnung: "", dicke: "", lambda: "" }]);
  const updateSchicht = (id, field, val) => update("schichten", b.schichten.map(s => s.id === id ? { ...s, [field]: val } : s));
  const deleteSchicht = (id) => update("schichten", b.schichten.filter(s => s.id !== id));
  const moveSchicht = (idx, dir) => {
    const arr = [...b.schichten];
    const swap = idx + dir;
    if (swap < 0 || swap >= arr.length) return;
    [arr[idx], arr[swap]] = [arr[swap], arr[idx]];
    update("schichten", arr);
  };

  const uWertBerechnet = berechneUWert(b.schichten, b.typ);
  const uWertAnzeige = uWertBerechnet !== null ? uWertBerechnet : (b.uWertManuell ? parseFloat(b.uWertManuell) : null);

  return (
    <div>
      <Select label="Bauteiltyp" value={b.typ} onChange={v => update("typ", v)} options={BAUTEIL_TYPEN} />
      <div style={{ display: "flex", gap: 8 }}>
        <Input label="Baujahr" value={b.baujahr} onChange={v => update("baujahr", v)} placeholder="1985" half />
        <Input label="San.-Jahr" value={b.sanierungsjahr} onChange={v => update("sanierungsjahr", v)} placeholder="2010" half />

      {/* Schichtaufbau */}
      <div style={{ marginBottom: 8 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.darkGray, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>
          Schichtaufbau (innen → außen)

        {(b.schichten || []).length === 0 && (
          <div style={{ fontSize: 12, color: C.darkGray, padding: "10px", textAlign: "center", background: C.bg, borderRadius: 8, marginBottom: 8 }}>
            Noch keine Schichten — tippe auf „+ Schicht"
          </div>
        )}

        {(b.schichten || []).map((s, idx) => (
          <div key={s.id} style={{ background: C.bg, borderRadius: 10, padding: "10px 10px 6px", marginBottom: 7, border: `1px solid ${C.lightGray}` }}>
            {/* Bezeichnung + Reihenfolge + Löschen */}
            <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>
              <div style={{ width: 22, height: 22, borderRadius: 6, background: C.blue, color: C.white, fontSize: 11, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{idx + 1}</div>
              <input
                value={s.bezeichnung} onChange={e => updateSchicht(s.id, "bezeichnung", e.target.value)}
                placeholder="z.B. Stahlbeton, Mineralwolle, Putz..."
                style={{ flex: 1, border: `1.5px solid ${C.lightGray}`, borderRadius: 7, padding: "6px 9px", fontSize: 13, fontFamily: "inherit", outline: "none", background: C.white }}
                onFocus={e => e.target.style.borderColor = C.orange}
                onBlur={e => e.target.style.borderColor = C.lightGray}
              />
              <button onClick={() => moveSchicht(idx, -1)} disabled={idx === 0} style={{ background: "none", border: "none", cursor: idx === 0 ? "default" : "pointer", color: idx === 0 ? C.lightGray : C.blue, fontSize: 14, padding: "0 2px" }}>↑</button>
              <button onClick={() => moveSchicht(idx, 1)} disabled={idx === b.schichten.length - 1} style={{ background: "none", border: "none", cursor: idx === b.schichten.length - 1 ? "default" : "pointer", color: idx === b.schichten.length - 1 ? C.lightGray : C.blue, fontSize: 14, padding: "0 2px" }}>↓</button>
              <button onClick={() => deleteSchicht(s.id)} style={{ background: "none", border: "none", color: C.danger, fontSize: 16, cursor: "pointer", padding: "0 2px" }}>×</button>
            </div>

            {/* Dicke + Lambda */}
            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <Input value={s.dicke} onChange={v => updateSchicht(s.id, "dicke", v)} type="number" placeholder="20" unit="cm" />

              <div style={{ flex: 1 }}>
                <Input value={s.lambda} onChange={v => updateSchicht(s.id, "lambda", v)} type="number" placeholder="0.035" unit="W/mK" />
              </div>
            </div>

            {/* λ-Schnellauswahl */}
            <div style={{ marginBottom: 4 }}>
              <div style={{ fontSize: 10, color: C.darkGray, marginBottom: 3 }}>λ-Schnellauswahl:</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {LAMBDA_PRESETS.slice(0, 8).map(p => (
                  <button key={p.label} onClick={() => updateSchicht(s.id, "lambda", String(p.value))} style={{

      {b.typ && (
        <>
          <UWertBadge uWert={uWertBerechnet} bauteilTyp={b.typ} />
          {uWertBerechnet === null && (
            <Input label="U-Wert manuell (falls bekannt)" value={b.uWertManuell} onChange={v => update("uWertManuell", v)} type="number" placeholder="0.25" unit="W/m²K" />
          )}
          {uWertBerechnet !== null && (
            <div style={{ fontSize: 11, color: C.darkGray, marginBottom: 8 }}>
              Rt = {(1 / uWertBerechnet).toFixed(3)} m²K/W · Rsi+Rse = {((RSI_RSE[b.typ]?.rsi || 0.13) + (RSI_RSE[b.typ]?.rse || 0.04)).toFixed(2)} m²K/W
            </div>
          )}
        </>
      )}

      <Textarea label="Notizen zum Bauteil" value={b.notizen} onChange={v => update("notizen", v)} placeholder="Zustand, Auffälligkeiten, Besonderheiten..." rows={2} />
    </div>
  );
}

// ─── BAUTEIL MULTI-EDITOR (3 Bauteile pro Raum) ──────────────────────────────
const BAUTEIL_LABELS = ["Bauteil 1", "Bauteil 2", "Bauteil 3"];
const BAUTEIL_ICONS  = ["🧱", "🪟", "🏗"];

function BauteilMultiEditor({ bauteile, onChange }) {
  const [aktiv, setAktiv] = useState(0);
  const list = bauteile && bauteile.length === 3 ? bauteile : [emptyBauteil(), emptyBauteil(), emptyBauteil()];

  const updateBauteil = (idx, val) => {
    const updated = list.map((b, i) => i === idx ? val : b);
    onChange(updated);
  };

  // Kurzinfo pro Tab (Typ + U-Wert wenn vorhanden)
  const tabLabel = (b, idx) => {
    if (!b.typ) return BAUTEIL_LABELS[idx];
    const u = berechneUWert(b.schichten, b.typ);
    const short = b.typ.split(" ")[0];
    return u !== null ? `${short} · ${u.toFixed(2)}` : short;
  };

  return (
    <div>
      {/* Sub-Tabs für 3 Bauteile */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        {list.map((b, idx) => (
          <button key={idx} onClick={() => setAktiv(idx)} style={{
            flex: 1, padding: "8px 4px", borderRadius: 10,
            border: `2px solid ${aktiv === idx ? C.blue : C.lightGray}`,
            background: aktiv === idx ? C.blue + "12" : C.white,
            color: aktiv === idx ? C.blue : C.darkGray,
            fontSize: 10, fontWeight: aktiv === idx ? 800 : 500, cursor: "pointer",
            textAlign: "center",
          }}>
            <div style={{ fontSize: 16, marginBottom: 2 }}>{BAUTEIL_ICONS[idx]}</div>
            {tabLabel(b, idx)}
            {b.typ && <div style={{ fontSize: 9, color: b.schichten?.length > 0 ? C.success : C.lightGray, marginTop: 1 }}>
              {b.schichten?.length > 0 ? `${b.schichten.length} Schicht${b.schichten.length > 1 ? "en" : ""}` : "leer"}
            </div>}
          </button>
        ))}
      </div>

      <Card style={{ marginBottom: 0 }}>
        <ST>{BAUTEIL_ICONS[aktiv]} {BAUTEIL_LABELS[aktiv]}</ST>
        <div style={{ fontSize: 12, color: C.darkGray, marginBottom: 10 }}>
          Schichten von innen → außen. U-Wert nach EN ISO 6946.
        </div>
        <BauteilEditor
          bauteil={list[aktiv]}
          onChange={val => updateBauteil(aktiv, val)}
        />
      </Card>

      {/* Übersicht aller 3 U-Werte wenn mind. 2 ausgefüllt */}
      {list.filter(b => b.typ).length >= 2 && (
        <div style={{ marginTop: 10, background: C.blue + "08", borderRadius: 12, padding: "12px 14px", border: `1px solid ${C.blue}20` }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: C.blue, marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.8 }}>
            Übersicht U-Werte
          </div>
          {list.map((b, idx) => {
            if (!b.typ) return null;
            const u = berechneUWert(b.schichten, b.typ);
            const uAnzeige = u !== null ? u : b.uWertManuell ? parseFloat(b.uWertManuell) : null;
            return (
              <div key={idx} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "5px 0", borderBottom: idx < 2 ? `1px solid ${C.lightGray}` : "none" }}>
                <span style={{ fontSize: 12, color: "#333" }}>{BAUTEIL_ICONS[idx]} {b.typ}</span>
                <span style={{ fontFamily: "monospace", fontWeight: 800, fontSize: 13, color: uAnzeige ? C.blue : C.lightGray }}>
                  {uAnzeige ? uAnzeige.toFixed(3) + " W/m²K" : "–"}
                  {u !== null && <span style={{ fontSize: 10, color: C.darkGray, fontWeight: 400 }}> (ber.)</span>}
                  {u === null && b.uWertManuell && <span style={{ fontSize: 10, color: C.darkGray, fontWeight: 400 }}> (man.)</span>}
                </span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5, marginBottom: 12 }}>
              {OBJEKTTYPEN.slice(0, 6).map(o => (
                <button key={o.label} onClick={() => setNeuProjekt(p => ({ ...p, objekttyp: p.objekttyp === o.label ? "" : o.label }))} style={{ padding: "7px 8px", borderRadius: 9, cursor: "pointer", textAlign: "left", border: `1.5px solid ${neuProjekt.objekttyp === o.label ? C.blue : C.lightGray}`, background: neuProjekt.objekttyp === o.label ? C.blue + "12" : C.white, display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 16 }}>{o.icon}</span>
                  <span style={{ fontSize: 11, fontWeight: neuProjekt.objekttyp === o.label ? 800 : 500, color: neuProjekt.objekttyp === o.label ? C.blue : "#333" }}>{o.label}</span>
                </button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => setNeuDialog(false)} style={{ flex: 1, padding: "11px", borderRadius: 10, border: `1.5px solid ${C.lightGray}`, background: "transparent", color: C.darkGray, fontWeight: 700, cursor: "pointer", fontSize: 14 }}>Abbrechen</button>
              <Btn onClick={handleNeuBestaetigen} disabled={!neuProjekt.adresse} full>Starten →</Btn>
            </div>
          </Card>
        )}

        {showBackup && <BackupPanel allData={allData} onRestore={onRestore} />}

        {gefiltert.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 20px", color: C.darkGray }}>
            <div style={{ fontSize: 44 }}>{suche ? "🔍" : "📋"}</div>
            <div style={{ fontSize: 14, fontWeight: 600, marginTop: 8 }}>{suche ? "Keine Treffer" : "Noch keine Begehungen"}</div>
          </div>
        )}
        {gefiltert.map(b => {
          const schwer = b.raeume.filter(r => r.schadensklasse === "3").length;
          const mittel = b.raeume.filter(r => r.schadensklasse === "2").length;
          const st = STATUS_CONFIG[b.status || "entwurf"];
          return (
            <Card key={b.id} style={{ cursor: "pointer" }} onClick={() => onSelect(b.id)}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                    <span style={{ fontSize: 16 }}>{OBJEKTTYP_ICONS[b.projekt.objekttyp] || "🏠"}</span>
                    <span style={{ fontWeight: 800, fontSize: 15, color: "#1a1a1a" }}>{b.projekt.adresse || "Kein Objekt"}</span>
                  </div>
                  <div style={{ fontSize: 12, color: C.darkGray }}>
                    {b.projekt.auftraggeber || "–"} · {b.erstellt}
                    {b.projekt.auftragsnummer && <span style={{ marginLeft: 6, color: C.blue, fontWeight: 600 }}>#{b.projekt.auftragsnummer}</span>}
                  </div>
                  <div style={{ marginTop: 7, display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
                    {/* Status Badge */}
                    <span style={{ fontSize: 10, fontWeight: 800, background: st.bg, color: st.color, borderRadius: 20, padding: "2px 9px", border: `1px solid ${st.color}40` }}>
                      {st.icon} {st.label}
                    </span>
                    <span style={{ fontSize: 11, color: C.darkGray }}>{b.raeume.length} Räume</span>
                    {schwer > 0 && <span style={{ fontSize: 11, background: "#C0392B20", border: "1px solid #C0392B50", color: C.danger, borderRadius: 20, padding: "1px 8px", fontWeight: 700 }}>Kl. 3: {schwer}</span>}
                    {mittel > 0 && <span style={{ fontSize: 11, background: "#E67E2220", border: "1px solid #E67E2250", color: C.warn, borderRadius: 20, padding: "1px 8px", fontWeight: 700 }}>Kl. 2: {mittel}</span>}
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-end" }}>
                  <div style={{ fontSize: 18 }}>›</div>
                  <button onClick={e => { e.stopPropagation(); if (window.confirm("Begehung löschen?")) onDelete(b.id); }} style={{ background: "none", border: "none", color: C.danger, fontSize: 11, cursor: "pointer", fontWeight: 600 }}>🗑</button>
                </div>
              </div>
              {/* Status schnell ändern */}
              <div style={{ marginTop: 10, borderTop: `1px solid ${C.bg}`, paddingTop: 8 }} onClick={e => e.stopPropagation()}>
                <StatusPicker value={b.status || "entwurf"} onChange={s => onStatusChange(b.id, s)} />
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

function RaumListeScreen({ begehung, onNeuerRaum, onRaumEdit, onExport, onCheckliste, onQR, onAussenKlimaChange, onPersonenChange, onProjektChange, onUnterschriftChange }) {

  const [showPersonen, setShowPersonen] = useState(false);
  const [showProjekt, setShowProjekt] = useState(false);

  const hatPersonen = ansprechperson?.name || (anwesende?.length > 0);
  return (
    <div>
      <div style={{ background: `linear-gradient(140deg, ${C.blue} 0%, #0D2F5E 100%)`, padding: "20px 16px 16px", borderRadius: "0 0 20px 20px", marginBottom: 14 }}>

      </div>
      <div style={{ padding: "0 16px 100px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
          <button onClick={onCheckliste} style={{ padding: "10px", borderRadius: 10, border: `1.5px solid ${C.blue}`, background: C.blue + "08", color: C.blue, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>☑️ Checkliste</button>
          <button onClick={onQR} style={{ padding: "10px", borderRadius: 10, border: `1.5px solid ${C.lightGray}`, background: "transparent", color: C.darkGray, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>📱 QR</button>
          <button onClick={() => { setShowPersonen(s => !s); setShowKlima(false); setShowProjekt(false); }} style={{ padding: "10px", borderRadius: 10, border: `1.5px solid ${hatPersonen ? C.blue : C.lightGray}`, background: hatPersonen ? C.blue + "08" : "transparent", color: hatPersonen ? C.blue : C.darkGray, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            👤 Personen{hatPersonen ? " ✓" : ""}
          </button>
          <button onClick={() => { setShowKlima(s => !s); setShowPersonen(false); setShowProjekt(false); }} style={{ padding: "10px", borderRadius: 10, border: `1.5px solid ${aussenklima?.temperatur ? C.orange : C.lightGray}`, background: aussenklima?.temperatur ? C.orange + "10" : "transparent", color: aussenklima?.temperatur ? C.orange : C.darkGray, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            🌡 Außenklima{aussenklima?.temperatur ? ` ${aussenklima.temperatur}°C` : ""}
          </button>
          <button onClick={() => { setShowProjekt(s => !s); setShowPersonen(false); setShowKlima(false); setShowSignatur(false); }} style={{ gridColumn: "1 / -1", padding: "10px", borderRadius: 10, border: `1.5px solid ${projekt.objekttyp ? C.blue : C.lightGray}`, background: projekt.objekttyp ? C.blue + "08" : "transparent", color: projekt.objekttyp ? C.blue : C.darkGray, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            {OBJEKTTYP_ICONS[projekt.objekttyp] || "🏠"} Objekttyp{projekt.objekttyp ? `: ${projekt.objekttyp}` : " wählen"}
          </button>
          <button onClick={() => { setShowSignatur(s => !s); setShowProjekt(false); setShowPersonen(false); setShowKlima(false); }} style={{ gridColumn: "1 / -1", padding: "10px", borderRadius: 10, border: `1.5px solid ${begehung.unterschrift ? C.success : C.lightGray}`, background: begehung.unterschrift ? C.success + "08" : "transparent", color: begehung.unterschrift ? C.success : C.darkGray, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            ✍️ Unterschrift Auftraggeber{begehung.unterschrift ? " ✓" : " (ausstehend)"}
          </button>
        </div>

        {showSignatur && (
          <Card>
            <ST>✍️ Unterschrift Auftraggeber</ST>
            <div style={{ fontSize: 12, color: C.darkGray, marginBottom: 10 }}>
              Auftraggeber unterschreibt nach der Begehung direkt auf dem Gerät. Gilt für die gesamte Begehung.
            </div>
            <SignaturPad
              signatur={begehung.unterschrift}
              onChange={onUnterschriftChange}
            />
            {begehung.unterschrift && (
              <div style={{ marginTop: 8, padding: "8px 12px", background: C.success + "15", borderRadius: 8, fontSize: 12, color: C.success, fontWeight: 700 }}>
                ✓ Unterschrift gespeichert
              </div>
            )}
          </Card>
        )}

        {showProjekt && (
          <Card>
            <ST>Projekt & Objekttyp</ST>
            <Input label="Adresse" value={projekt.adresse} onChange={v => onProjektChange({ ...projekt, adresse: v })} placeholder="Musterstr. 5, 6363 Westendorf" />
            <Input label="Auftraggeber" value={projekt.auftraggeber} onChange={v => onProjektChange({ ...projekt, auftraggeber: v })} placeholder="Name" />
            <div style={{ display: "flex", gap: 8 }}>
              <Input label="Datum" value={projekt.datum} onChange={v => onProjektChange({ ...projekt, datum: v })} type="date" half />
              <Input label="Gutachter" value={projekt.gutachter} onChange={v => onProjektChange({ ...projekt, gutachter: v })} placeholder="DI Tassenbacher" half />
            </div>
            <Input label="Auftragsnummer" value={projekt.auftragsnummer || ""} onChange={v => onProjektChange({ ...projekt, auftragsnummer: v })} placeholder="z.B. 2025-047" />
            <ObjekttypPicker value={projekt.objekttyp || ""} onChange={v => onProjektChange({ ...projekt, objekttyp: v })} />
          </Card>
        )}

        {showPersonen && (
          <PersonenCard
            ansprechperson={ansprechperson || { name: "", telefon: "", email: "" }}
            anwesende={anwesende || []}

            onAnwesendeChange={a => onPersonenChange({ ansprechperson: ansprechperson || {}, anwesende: a })}
          />
        )}

        {showKlima && (
          <AussenKlimaCard
            klima={aussenklima || { temperatur: "", feuchte: "", wetter: "", uhrzeit: "" }}
            onChange={onAussenKlimaChange}
          />
        )}
        <ZusammenfassungsTabelle raeume={raeume} />

        {raeume.length === 0 && (
          <div style={{ textAlign: "center", padding: "30px 20px", color: C.darkGray }}>
            <div style={{ fontSize: 44 }}>🏠</div>
            <div style={{ fontSize: 14, fontWeight: 600, marginTop: 8 }}>Noch keine Räume</div>
          </div>
        )}
        {raeume.map((r, i) => {
          const klasse = SCHADENSKLASSEN.find(k => k.id === r.schadensklasse);
          const t80 = kritOberflTemp(parseFloat(r.temperatur), 80);
          const Tof = parseFloat(r.oberflaechentemp);
          const schimmelRisk = t80 !== null && !isNaN(Tof) ? Tof <= t80 : null;
          const ampelIcon = { gruen: "🟢", gelb: "🟡", rot: "🔴" };
          return (
            <Card key={r.id} style={{ cursor: "pointer" }} onClick={() => onRaumEdit(i)}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    {r.dringlichkeit && <span style={{ fontSize: 16 }}>{ampelIcon[r.dringlichkeit]}</span>}
                    <span style={{ fontWeight: 800, fontSize: 15 }}>{r.typ || "Unbekannt"}</span>
                    {r.bezeichnung && <span style={{ fontSize: 12, color: C.darkGray }}>({r.bezeichnung})</span>}
                  </div>
                  <div style={{ marginTop: 7, display: "flex", flexWrap: "wrap", gap: 5 }}>
                    {klasse && <span style={{ background: klasse.color + "20", border: `1px solid ${klasse.color}60`, color: klasse.color, borderRadius: 20, padding: "2px 9px", fontSize: 11, fontWeight: 700 }}>{klasse.label}</span>}
                    {schimmelRisk === true && <span style={{ background: C.warn + "20", border: `1px solid ${C.warn}60`, color: C.warn, borderRadius: 20, padding: "2px 9px", fontSize: 11, fontWeight: 700 }}>🍄 Schimmel</span>}
                    {r.temperatur && r.feuchte && <span style={{ fontSize: 11, color: C.darkGray }}>{r.temperatur}°C · {r.feuchte}%</span>}
                    {r.beurteilungText && <span style={{ fontSize: 11, color: C.success }}>📝</span>}
                    {r.fotos?.length > 0 && <span style={{ fontSize: 11, color: C.darkGray }}>📷 {r.fotos.length}</span>}
                    {r.sprachnotizen?.length > 0 && <span style={{ fontSize: 11, color: C.darkGray }}>🎙 {r.sprachnotizen.length}</span>}
                    {r.bauteil?.typ && (() => { const u = berechneUWert(r.bauteil.schichten, r.bauteil.typ); return u !== null ? <span style={{ fontSize: 11, color: C.blue, fontFamily: "monospace" }}>🧱 {u.toFixed(2)} W/m²K</span> : r.bauteil.typ ? <span style={{ fontSize: 11, color: C.darkGray }}>🧱 {r.bauteil.typ.split(" ")[0]}</span> : null; })()}
                  </div>
                </div>
                <div style={{ width: 30, height: 30, borderRadius: 8, background: C.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>›</div>
              </div>
            </Card>
          );
        })}
        <button onClick={onNeuerRaum} style={{ width: "100%", padding: 13, borderRadius: 11, border: `2px dashed ${C.orange}`, background: "transparent", color: C.orange, fontSize: 15, fontWeight: 700, cursor: "pointer", marginBottom: 10 }}>
          + Neuer Raum
        </button>
        {raeume.length > 0 && <Btn onClick={onExport} variant="blue" full>📄 Gutachten-Entwurf</Btn>}
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
export default function App() {
  const [allData, setAllData] = useState(() => loadAll());
  const [screen, setScreen] = useState("begehungen");
  const [aktivId, setAktivId] = useState(null);
  const [editRaumIndex, setEditRaumIndex] = useState(null);
  const [currentRaum, setCurrentRaum] = useState(emptyRaum());

  const aktiv = allData.begehungen.find(b => b.id === aktivId);

  useEffect(() => { saveAll(allData); }, [allData]);

  const updateAktiv = (updater) => {
    setAllData(d => ({ ...d, begehungen: d.begehungen.map(b => b.id === aktivId ? updater(b) : b) }));
  };

  const handleNeueBegehung = (initProjekt) => {
    const b = emptyBegehung();
    if (initProjekt) {
      b.projekt = { ...b.projekt, ...initProjekt };
    }
    setAllData(d => ({ ...d, begehungen: [...d.begehungen, b] }));
    setAktivId(b.id);
    setScreen("raeume");
  };

  const handleDeleteBegehung = (id) => {
    setAllData(d => ({ ...d, begehungen: d.begehungen.filter(b => b.id !== id) }));
  };

  const handleStatusChange = (id, status) => {
    setAllData(d => ({ ...d, begehungen: d.begehungen.map(b => b.id === id ? { ...b, status } : b) }));
  };

  const handleRestore = (data) => {
    setAllData(data);
    setScreen("begehungen");
  };

  const handleSaveRaum = () => {
    updateAktiv(b => ({
      ...b,
      raeume: editRaumIndex === null ? [...b.raeume, currentRaum] : b.raeume.map((r, i) => i === editRaumIndex ? currentRaum : r),
    }));
    setScreen("raeume");
  };

  const handleDeleteRaum = () => {
    if (window.confirm("Raum löschen?")) {
      updateAktiv(b => ({ ...b, raeume: b.raeume.filter((_, i) => i !== editRaumIndex) }));
      setScreen("raeume");
    }
  };

  const handleDuplicateRaum = () => {
    const kopie = { ...currentRaum, id: Date.now() + Math.random(), bezeichnung: (currentRaum.bezeichnung || "") + " (Kopie)", fotos: [], skizze: null, planBild: null, sprachnotizen: [] };
    updateAktiv(b => ({ ...b, raeume: [...b.raeume, kopie] }));
    setScreen("raeume");
  };

  const bottomNav = (
    <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: C.white, borderTop: `1px solid ${C.lightGray}`, display: "flex", padding: "8px 16px 18px", gap: 6, boxShadow: "0 -4px 20px rgba(0,0,0,0.08)" }}>
      {[
        { id: "begehungen", icon: "📋", label: "Projekte" },
        { id: "raeume", icon: "🏠", label: "Räume" },
        { id: "export", icon: "📄", label: "Export" },
      ].map(tab => {
        const active = screen === tab.id || (screen === "raum-edit" && tab.id === "raeume") || (screen === "checkliste" && tab.id === "raeume");
        return (
          <button key={tab.id} onClick={() => { if (tab.id === "begehungen") { setScreen("begehungen"); } else if (aktiv) setScreen(tab.id); }} style={{ flex: 1, padding: "7px 4px 5px", borderRadius: 10, border: "none", background: active ? C.blue + "15" : "transparent", color: active ? C.blue : C.darkGray, cursor: "pointer", fontSize: 10, fontWeight: 700 }}>
            <div style={{ fontSize: 22, marginBottom: 1 }}>{tab.icon}</div>{tab.label}
          </button>
        );
      })}
    </div>
  );

  return (
    <div style={{ maxWidth: 430, margin: "0 auto", minHeight: "100vh", background: C.bg, fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif" }}>
      {screen === "begehungen" && (
        <BegehungenScreen
          begehungen={allData.begehungen}
          onSelect={id => { setAktivId(id); setScreen("raeume"); }}
          onNeu={handleNeueBegehung}
          onDelete={handleDeleteBegehung}
          onStatusChange={handleStatusChange}
          allData={allData}
          onRestore={handleRestore}
        />
      )}
      {screen === "raeume" && aktiv && (
        <RaumListeScreen
          begehung={aktiv}
          onNeuerRaum={() => { setCurrentRaum(emptyRaum()); setEditRaumIndex(null); setScreen("raum-edit"); }}
          onRaumEdit={i => { setCurrentRaum({ ...aktiv.raeume[i] }); setEditRaumIndex(i); setScreen("raum-edit"); }}
          onExport={() => setScreen("export")}
          onCheckliste={() => setScreen("checkliste")}
          onQR={() => setScreen("qr")}
          onAussenKlimaChange={k => updateAktiv(b => ({ ...b, aussenklima: k }))}
          onPersonenChange={p => updateAktiv(b => ({ ...b, ansprechperson: p.ansprechperson, anwesende: p.anwesende }))}
          onProjektChange={p => updateAktiv(b => ({ ...b, projekt: p }))}
          onUnterschriftChange={u => updateAktiv(b => ({ ...b, unterschrift: u }))}
        />
      )}
      {screen === "raum-edit" && (
        <RaumEditScreen
          raum={currentRaum}
          onChange={(f, v) => setCurrentRaum(r => ({ ...r, [f]: v }))}
          onSave={handleSaveRaum}
          onDelete={handleDeleteRaum}
          onDuplicate={handleDuplicateRaum}
          isNew={editRaumIndex === null}
        />
      )}
      {screen === "export" && aktiv && (
        <ExportScreen
          begehung={aktiv}
          onBack={() => setScreen("raeume")}
          onQR={() => setScreen("qr")}
        />
      )}
      {screen === "checkliste" && aktiv && (
        <ChecklisteScreen
          checks={aktiv.checkliste || {}}
          onChange={(id, val) => updateAktiv(b => ({ ...b, checkliste: { ...b.checkliste, [id]: val } }))}
          onBack={() => setScreen("raeume")}
        />
      )}
      {screen === "qr" && aktiv && (
        <QRScreen begehung={aktiv} onBack={() => setScreen("raeume")} />
      )}
      {screen !== "begehungen" && bottomNav}
      {screen === "begehungen" && (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: C.white, borderTop: `1px solid ${C.lightGray}`, padding: "8px 16px 18px", boxShadow: "0 -4px 20px rgba(0,0,0,0.08)" }}>
          <div style={{ textAlign: "center", fontSize: 11, color: C.darkGray, fontWeight: 600 }}>📋 Projektübersicht</div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
